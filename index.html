<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestione Spese PRO MAX+</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont;background:#343541;color:#ececf1;overflow:hidden}
header{padding:12px;text-align:center;background:#202123;font-weight:600}

.tabs{display:flex;justify-content:space-around;background:#202123;padding:8px}
.tab{cursor:pointer;padding:6px;border-radius:8px;font-size:12px;display:flex;flex-direction:column;align-items:center}
.tab.active{background:#3b82f6}
.tab span{font-size:10px}

.page{display:none;padding:12px}
.page.active{display:block}

/* SIDEBAR: versione con strip icone visibile */
.sidebar{
 width:210px;
 background:#202123;
 padding:8px;
 position:fixed;
 left:0;top:0;
 height:100%;
 transition:.25s;
 overflow:hidden;
 padding-top:120px;
 display:flex;
 flex-direction:column;
 gap:10px;
}

/* CHIUSA: diventa solo barra icone */
.sidebar.collapsed{
 width:60px;
}

/* testo nascosto quando chiusa */
.sidebar.collapsed .text,
.sidebar.collapsed input,
.sidebar.collapsed select,
.sidebar.collapsed button{
 display:none;
}

.card{
 background:#444654;
 padding:10px;
 border-radius:10px;
 cursor:pointer;
 transition:.2s;
}

.card:hover{transform:scale(1.02)}

.icon{
 font-size:16px;
 text-align:center;
}

/* MAIN si adatta sempre */
.main{
 margin-left:210px;
 padding:12px;
 transition:.25s;
}

.main.collapsed{
 margin-left:60px;
}

button{padding:5px;border:none;border-radius:6px;background:#3b82f6;color:white;width:100%;margin-top:4px}
input,select{width:100%;padding:4px;margin-top:4px;border-radius:5px;border:none;background:#202123;color:white}

</style>
</head>
<body>
<header>💰 Gestione Spese</header>

<div class="tabs">
<div class="tab active" onclick="showTab('dashPage',this)">🏠<span>Dashboard</span></div>
<div class="tab" onclick="showTab('movPage',this)">📋<span>Movimenti</span></div>
<div class="tab" onclick="showTab('grafPage',this)">📊<span>Grafici</span></div>
</div>

<!-- SIDEBAR -->
<div class="sidebar collapsed" id="menu" onclick="toggleMenu()">

<div class="card">
<div class="icon">💳</div>
<span class="text">Saldo</span>
<input id="saldo" type="number">
</div>

<div class="card">
<div class="icon">🎯</div>
<span class="text">Obiettivo</span>
<input id="obiettivo" type="number">
</div>

<div class="card">
<div class="icon">➕</div>
<span class="text">Entrata</span>
<input id="entrata" type="number">
<button onclick="event.stopPropagation();addEntrata()">+</button>
</div>

<div class="card">
<div class="icon">➖</div>
<span class="text">Spesa</span>
<input id="spesa" type="number">
<select id="categoria"></select>
<button onclick="event.stopPropagation();addSpesa()">-</button>
</div>

</div>

<!-- MAIN -->
<div class="main collapsed" id="main">

<div id="dashPage" class="page active">
<div class="card" id="dash"></div>
<div class="card" id="forecast"></div>
</div>

<div id="movPage" class="page">
<div class="card" id="lista"></div>
</div>

<div id="grafPage" class="page">
<div class="card"><canvas id="chart"></canvas></div>
<div class="card"><canvas id="trend"></canvas></div>
</div>

</div>

<script>
let db=JSON.parse(localStorage.getItem('db'))||{
 saldo:0,obiettivo:200,
 entrate:[],spese:[],
 categorie:[{nome:"Cibo"},{nome:"Casa"},{nome:"Svago"}]
}

function save(){localStorage.setItem('db',JSON.stringify(db));update()}

const menu=document.getElementById('menu')
const main=document.getElementById('main')

function toggleMenu(){
 menu.classList.toggle('collapsed')
 main.classList.toggle('collapsed')
}

function showTab(id,el){
 document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'))
 document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'))
 document.getElementById(id).classList.add('active')
 el.classList.add('active')
}

function addEntrata(){if(!entrata.value)return;db.entrate.push({importo:+entrata.value});save()}
function addSpesa(){if(!spesa.value)return;db.spese.push({importo:+spesa.value,cat:categoria.value});save()}

function update(){
let totSp=db.spese.reduce((a,b)=>a+b.importo,0)
let totEn=db.entrate.reduce((a,b)=>a+b.importo,0)
let saldo=db.saldo+totEn-totSp
let disponibile=saldo-db.obiettivo

dash.innerHTML=`💰 Saldo: ${saldo.toFixed(2)}€`;
forecast.innerHTML=`🎯 Obiettivo: ${disponibile.toFixed(2)}€`;
renderLista()
}

function renderLista(){
lista.innerHTML=db.spese.map(x=>`<div>€${x.importo}</div>`).join('')
}

update()
</script>
</body>
</html>
