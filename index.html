<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gestione Spese PRO MAX++</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{margin:0;font-family:-apple-system;background:#343541;color:#ececf1;overflow:hidden}
header{padding:12px;text-align:center;background:#202123;font-weight:600}

.tabs{display:flex;justify-content:space-around;background:#202123;padding:8px}
.tab{cursor:pointer;padding:6px;border-radius:8px;font-size:12px;display:flex;flex-direction:column;align-items:center}
.tab.active{background:#3b82f6}

.page{display:none;padding:12px}
.page.active{display:block}

/* SIDEBAR sotto header + tabs */
.sidebar{
 width:210px;
 background:#202123;
 padding:8px;
 position:fixed;
 left:0;
 top:88px; /* sotto header + tabs */
 height:calc(100% - 88px);
 transition:.3s cubic-bezier(.25,.8,.25,1);
 overflow:hidden;
 padding-top:30px;
}

.sidebar.collapsed{
 width:60px;
 background:#444654;
}

.sidebar.collapsed .text,
.sidebar.collapsed input,
.sidebar.collapsed select,
.sidebar.collapsed button{
 display:none;
}

.card{background:#444654;padding:10px;border-radius:10px;margin-bottom:10px}
.icon{font-size:18px;text-align:center}

.main{
 margin-left:210px;
 margin-top:0;
 padding:12px;
 transition:.3s cubic-bezier(.25,.8,.25,1)
}
.main.collapsed{margin-left:60px}

button{padding:6px;border:none;border-radius:6px;background:#3b82f6;color:white;width:100%;margin-top:4px}

/* IMPORTANT: evita zoom iPhone */
input,select{
 width:100%;
 padding:6px;
 margin-top:4px;
 border-radius:5px;
 border:none;
 background:#202123;
 color:white;
 font-size:16px; /* blocca zoom automatico iOS */
}

.alert{padding:6px;border-radius:6px;margin-top:6px}
.red{background:#7f1d1d}

</style>
</head>
<body>
<header>💰 Gestione Spese</header>

<div class="tabs">
<div class="tab active" onclick="showTab('dashPage',this)">🏠<span>Dashboard</span></div>
<div class="tab" onclick="showTab('movPage',this)">📋<span>Movimenti</span></div>
<div class="tab" onclick="showTab('grafPage',this)">📊<span>Grafici</span></div>
</div>

<div class="sidebar collapsed" id="menu">
<div class="card"><div class="icon">💰</div><span class="text">Saldo</span><input id="saldo" type="number"></div>
<div class="card"><div class="icon">🎯</div><span class="text">Obiettivo</span><input id="obiettivo" type="number"></div>
<div class="card"><div class="icon">📈</div><span class="text">Entrata</span><input id="entrata" type="number"><button onclick="event.stopPropagation();addEntrata()">Aggiungi</button></div>
<div class="card"><div class="icon">📉</div><span class="text">Spesa</span><input id="spesa" type="number"><select id="categoria"></select><button onclick="event.stopPropagation();addSpesa()">Aggiungi</button></div>
</div>

<div class="main collapsed" id="main">

<div id="dashPage" class="page active">
<select id="meseSel" onchange="update()"></select>
<div class="card" id="dash"></div>
<div id="alert"></div>
</div>

<div id="movPage" class="page">
<div class="card" id="lista"></div>
</div>

<div id="grafPage" class="page">
<div class="card"><canvas id="chart"></canvas></div>
</div>

</div>

<script>
let db=JSON.parse(localStorage.getItem('db'))||{
 saldo:0,obiettivo:200,
 entrate:[],spese:[],
 categorie:[{nome:"Cibo",budget:300},{nome:"Casa",budget:800}]
}

const menu=document.getElementById('menu')
const main=document.getElementById('main')

menu.addEventListener('click',(e)=>{
 if(e.target.closest('input,button,select')) return;
 menu.classList.toggle('collapsed')
 main.classList.toggle('collapsed')
})

let startX=0
window.addEventListener('touchstart',e=>startX=e.touches[0].clientX)
window.addEventListener('touchend',e=>{
 let endX=e.changedTouches[0].clientX
 if(startX<50 && endX>120){menu.classList.remove('collapsed');main.classList.remove('collapsed')}
 if(startX>100 && endX<50){menu.classList.add('collapsed');main.classList.add('collapsed')}
})

function save(){localStorage.setItem('db',JSON.stringify(db));update()}

function addEntrata(){if(!entrata.value)return;db.entrate.push({importo:+entrata.value,data:new Date().toISOString()});save()}
function addSpesa(){if(!spesa.value)return;db.spese.push({importo:+spesa.value,cat:categoria.value,data:new Date().toISOString()});save()}

function showTab(id,el){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.getElementById(id).classList.add('active');el.classList.add('active')}

function getMonth(d){return d.slice(0,7)}

function update(){
let mese=meseSel.value
let sp=db.spese.filter(x=>getMonth(x.data)==mese)
let en=db.entrate.filter(x=>getMonth(x.data)==mese)

let totSp=sp.reduce((a,b)=>a+b.importo,0)
let totEn=en.reduce((a,b)=>a+b.importo,0)
let saldo=db.saldo+totEn-totSp

dash.innerHTML=`💰 ${saldo.toFixed(2)}€`

let alertMsg=""
db.categorie.forEach(c=>{
 let spCat=sp.filter(x=>x.cat==c.nome).reduce((a,b)=>a+b.importo,0)
 if(spCat>c.budget) alertMsg+=`<div class='alert red'>⚠️ superato ${c.nome}</div>`
})
alert.innerHTML=alertMsg

renderLista(sp,en)
renderChart(sp)
}

function renderLista(sp,en){
let all=[...sp,...en]
lista.innerHTML=all.map(x=>`<div>${x.data.slice(0,10)} €${x.importo}</div>`).join('')
}

let chart
function renderChart(sp){if(chart)chart.destroy();
let perCat={}
sp.forEach(s=>perCat[s.cat]=(perCat[s.cat]||0)+s.importo)
chart=new Chart(document.getElementById('chart'),{type:'doughnut',data:{labels:Object.keys(perCat),datasets:[{data:Object.values(perCat)}]}})
}

function initMesi(){
let mesi=new Set()
db.spese.concat(db.entrate).forEach(x=>mesi.add(getMonth(x.data)))
mesi=[...mesi]
if(mesi.length==0) mesi=[new Date().toISOString().slice(0,7)]
meseSel.innerHTML=mesi.map(m=>`<option value='${m}'>${m}</option>`).join('')
}

initMesi()
update()
</script>
</body>
</html>
