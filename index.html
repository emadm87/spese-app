<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestione Spese PRO MAX+</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{margin:0;font-family:-apple-system;background:#343541;color:#ececf1;overflow:hidden}
header{padding:12px;text-align:center;background:#202123}

.tabs{display:flex;justify-content:space-around;background:#202123;padding:8px}
.tab{cursor:pointer;padding:6px;border-radius:8px;font-size:12px;display:flex;flex-direction:column;align-items:center}
.tab.active{background:#3b82f6}
.tab span{font-size:10px}

.page{display:none;padding:12px}
.page.active{display:block}

.sidebar{width:210px;background:#202123;padding:8px;position:fixed;left:0;top:0;height:100%;transition:.3s}
.sidebar.collapsed{width:48px}
.sidebar.collapsed input,.sidebar.collapsed select,.sidebar.collapsed button,.sidebar.collapsed .text{display:none}

.icon{font-size:12px;text-align:center;cursor:pointer}

.main{margin-left:210px;padding:12px;transition:.3s}
.main.collapsed{margin-left:48px}

.card{background:#444654;padding:10px;border-radius:10px;margin-bottom:8px}

button{padding:4px;border:none;border-radius:6px;background:#3b82f6;color:white;width:100%;margin-top:4px}

input,select{width:100%;padding:4px;margin-top:4px;border-radius:5px;border:none;background:#202123;color:white}

.toggle-btn{position:fixed;bottom:10px;left:10px;width:22px;height:22px;background:#3b82f6;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;cursor:pointer}

</style>
</head>
<body>
<header>💰 Gestione Spese</header>

<div class="tabs">
<div class="tab active" onclick="showTab('dashPage',this)">🏠<span>Dashboard</span></div>
<div class="tab" onclick="showTab('movPage',this)">📋<span>Movimenti</span></div>
<div class="tab" onclick="showTab('grafPage',this)">📊<span>Grafici</span></div>
</div>

<div class="sidebar collapsed" id="menu">
<div class="card" onclick="expandMenu()"><div class="icon">💳</div><span class="text">Saldo</span><input id="saldo" type="number"></div>
<div class="card" onclick="expandMenu()"><div class="icon">🎯</div><span class="text">Obiettivo</span><input id="obiettivo" type="number"></div>
<div class="card" onclick="expandMenu()"><div class="icon">➕</div><span class="text">Entrata</span><input id="entrata" type="number"><button onclick="addEntrata()">+</button></div>
<div class="card" onclick="expandMenu()"><div class="icon">➖</div><span class="text">Spesa</span><input id="spesa" type="number"><select id="categoria"></select><button onclick="addSpesa()">-</button></div>
</div>

<div class="main collapsed" id="main">

<div id="dashPage" class="page active">
<div class="card"><div id="dash"></div><div id="forecast"></div></div>
</div>

<div id="movPage" class="page">
<div class="card"><div id="lista"></div></div>
</div>

<div id="grafPage" class="page">
<div class="card"><canvas id="chart"></canvas></div>
<div class="card"><canvas id="trend"></canvas></div>
</div>

</div>

<div class="toggle-btn" onclick="toggleMenu()">☰</div>

<script>
let db=JSON.parse(localStorage.getItem('db'))||{
 saldo:0,obiettivo:200,
 entrate:[],spese:[],
 categorie:[{nome:"Cibo",budget:300},{nome:"Casa",budget:800},{nome:"Svago",budget:150}],
 fisse:[{nome:"Affitto",importo:500}]
}

function save(){localStorage.setItem('db',JSON.stringify(db));update()}

function toggleMenu(){menu.classList.toggle('collapsed');main.classList.toggle('collapsed')}
function expandMenu(){menu.classList.remove('collapsed');main.classList.remove('collapsed')}

function showTab(id,el){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.getElementById(id).classList.add('active');el.classList.add('active')}

function addEntrata(){if(!entrata.value)return;db.entrate.push({importo:+entrata.value,data:new Date()});save()}
function addSpesa(){if(!spesa.value)return;db.spese.push({importo:+spesa.value,cat:categoria.value,data:new Date()});save()}

function update(){
let totSp=db.spese.reduce((a,b)=>a+b.importo,0)
let totEn=db.entrate.reduce((a,b)=>a+b.importo,0)
let saldo=db.saldo+totEn-totSp
let disponibile=saldo-db.obiettivo

dash.innerHTML=`Saldo: €${saldo.toFixed(2)}<br>Disponibile: €${disponibile.toFixed(2)}`

forecast.innerHTML=`Previsione fine mese: €${(saldo-disponibile/2).toFixed(2)}`

let perCat={}
db.spese.forEach(s=>{perCat[s.cat]=(perCat[s.cat]||0)+s.importo})
renderChart(perCat)
renderTrend()
renderLista()
}

let chart,trend
function renderChart(data){if(chart)chart.destroy();chart=new Chart(chartEl(),{type:'doughnut',data:{labels:Object.keys(data),datasets:[{data:Object.values(data)}]}})}
function chartEl(){return document.getElementById('chart')}

function renderTrend(){if(trend)trend.destroy();let map={},saldo=0;db.spese.concat(db.entrate).forEach(x=>{saldo+=x.importo*(x.cat?-1:1);let m="Mese";map[m]=(map[m]||0)+saldo});trend=new Chart(document.getElementById('trend'),{type:'line',data:{labels:Object.keys(map),datasets:[{data:Object.values(map)}]}})}

function renderLista(){lista.innerHTML=db.spese.map(x=>`<div>€${x.importo}</div>`).join('')}

update()
</script>
</body>
</html>
