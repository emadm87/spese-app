<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestione Spese PRO MAX+</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont;background:#343541;color:#ececf1;overflow:hidden}
header{padding:12px;text-align:center;background:#202123;font-weight:600}

.tabs{display:flex;justify-content:space-around;background:#202123;padding:8px}
.tab{cursor:pointer;padding:6px;border-radius:8px;font-size:12px;display:flex;flex-direction:column;align-items:center}
.tab.active{background:#3b82f6}
.tab span{font-size:10px}

.page{display:none;padding:12px}
.page.active{display:block}

/* SIDEBAR */
.sidebar{
 width:210px;
 background:#202123;
 padding:8px;
 position:fixed;
 left:0;top:0;
 height:100%;
 transition:.3s;
 overflow:auto;
 padding-top:90px; /* <-- sposta contenuti più in basso */
}
.sidebar.collapsed{width:48px}

.sidebar.collapsed .text{display:none}
.sidebar.collapsed input,
.sidebar.collapsed select,
.sidebar.collapsed button{display:none}

.icon{
 font-size:12px;
 display:flex;
 justify-content:center;
 cursor:pointer;
}

.main{
 margin-left:210px;
 padding:12px;
 transition:.3s
}
.main.collapsed{margin-left:48px}

.card{background:#444654;padding:10px;border-radius:10px;margin-bottom:8px}

button{padding:5px;border:none;border-radius:6px;background:#3b82f6;color:white;width:100%;margin-top:4px}

input,select{width:100%;padding:4px;margin-top:4px;border-radius:5px;border:none;background:#202123;color:white}

/* niente toggle button */

</style>
</head>
<body>
<header>💰 Gestione Spese</header>

<div class="tabs">
<div class="tab active" onclick="showTab('dashPage',this)">🏠<span>Dashboard</span></div>
<div class="tab" onclick="showTab('movPage',this)">📋<span>Movimenti</span></div>
<div class="tab" onclick="showTab('grafPage',this)">📊<span>Grafici</span></div>
</div>

<!-- SIDEBAR -->
<div class="sidebar collapsed" id="menu">
<div class="card"><div class="icon">💳</div><span class="text">Saldo</span><input id="saldo" type="number"></div>
<div class="card"><div class="icon">🎯</div><span class="text">Obiettivo</span><input id="obiettivo" type="number"></div>
<div class="card"><div class="icon">➕</div><span class="text">Entrata</span><input id="entrata" type="number"><button onclick="addEntrata()">+</button></div>
<div class="card"><div class="icon">➖</div><span class="text">Spesa</span><input id="spesa" type="number"><select id="categoria"></select><button onclick="addSpesa()">-</button></div>
</div>

<!-- MAIN -->
<div class="main collapsed" id="main">

<div id="dashPage" class="page active">
<div class="card"><div id="dash"></div><div id="forecast"></div></div>
</div>

<div id="movPage" class="page">
<div class="card"><div id="lista"></div></div>
</div>

<div id="grafPage" class="page">
<div class="card"><canvas id="chart"></canvas></div>
<div class="card"><canvas id="trend"></canvas></div>
</div>

</div>

<script>
let db=JSON.parse(localStorage.getItem('db'))||{
 saldo:0,obiettivo:200,
 entrate:[],spese:[],
 categorie:[{nome:"Cibo"},{nome:"Casa"},{nome:"Svago"}]
}

function save(){localStorage.setItem('db',JSON.stringify(db));update()}

// CLICK SIDEBAR AREA TOGGLE
const menu=document.getElementById('menu')
const main=document.getElementById('main')

menu.addEventListener('click',(e)=>{
 // se clicco su input non toggla
 if(e.target.closest('input,button,select')) return;
 menu.classList.toggle('collapsed')
 main.classList.toggle('collapsed')
})

function showTab(id,el){
 document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'))
 document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'))
 document.getElementById(id).classList.add('active')
 el.classList.add('active')
}

function addEntrata(){if(!entrata.value)return;db.entrate.push({importo:+entrata.value,data:new Date().toISOString()});save()}
function addSpesa(){if(!spesa.value)return;db.spese.push({importo:+spesa.value,cat:categoria.value,data:new Date().toISOString()});save()}

function update(){
let totSp=db.spese.reduce((a,b)=>a+b.importo,0)
let totEn=db.entrate.reduce((a,b)=>a+b.importo,0)
let saldo=db.saldo+totEn-totSp
let disponibile=saldo-db.obiettivo

dash.innerHTML=`💰 ${saldo.toFixed(2)}€<br>🎯 Obiettivo: ${disponibile.toFixed(2)}€`

forecast.innerHTML=`Previsione mese: ${(saldo-disponibile/2).toFixed(2)}€`

renderLista()
renderChart()
renderTrend()
}

function renderLista(){
lista.innerHTML=db.spese.map(x=>`<div>€${x.importo}</div>`).join('')
}

let chart,trend
function renderChart(){if(chart)chart.destroy();chart=new Chart(document.getElementById('chart'),{type:'doughnut',data:{labels:['Spese'],datasets:[{data:[db.spese.reduce((a,b)=>a+b.importo,0)]}]}})}
function renderTrend(){if(trend)trend.destroy();trend=new Chart(document.getElementById('trend'),{type:'line',data:{labels:['Andamento'],datasets:[{data:[0,10,5,20]}]}})}

update()
</script>
</body>
</html>
